<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calorie Planner</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Outfit", sans-serif;
        background: linear-gradient(135deg, #eef2ff, #f8fafc);
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .card {
        max-width: 850px;
        width: 100%;
        border-radius: 18px;
        border: none;
      }

      h1 {
        font-weight: 600;
      }

      .result {
        display: none;
      }
    </style>
  </head>

  <body>
    <div class="card shadow-lg p-4">
      <div class="row align-items-center">
        <div class="col-md-5 mb-3">
          <h1>Calorie Planner</h1>
          <p class="text-muted">
            Calculate your daily calorie needs using the scientifically proven
            Mifflin-St Jeor formula.
          </p>
        </div>

        <div class="col-md-7">
          <form id="form">
            <div class="row g-2">
              <div class="col-md-6">
                <select name="gender" class="form-select">
                  <option value="male">Male</option>
                  <option value="female">Female</option>
                </select>
              </div>

              <div class="col-md-6">
                <input
                  type="number"
                  name="age"
                  class="form-control"
                  placeholder="Age"
                  required
                />
              </div>

              <div class="col-md-6">
                <input
                  type="number"
                  name="height"
                  class="form-control"
                  placeholder="Height (cm)"
                  required
                />
              </div>

              <div class="col-md-6">
                <input
                  type="number"
                  name="weight"
                  class="form-control"
                  placeholder="Weight (kg)"
                  required
                />
              </div>
            </div>

            <select name="activity" class="form-select mt-2">
              <option value="sedentary">Sedentary</option>
              <option value="light">Lightly Active</option>
              <option value="moderate">Moderate</option>
              <option value="active">Very Active</option>
            </select>

            <select name="goal" class="form-select mt-2">
              <option value="maintain">Maintain</option>
              <option value="lose">Lose Fat</option>
              <option value="bulk">Build Muscle</option>
              <option value="recomp">Recomposition</option>
            </select>

            <button class="btn btn-dark w-100 mt-3">Calculate Calories</button>
          </form>

          <div class="result mt-4">
            <div class="alert alert-light border">
              Maintenance: <strong id="maintenance"></strong> kcal
            </div>

            <div class="alert alert-dark text-white">
              Recommended: <strong id="recommended"></strong> kcal
            </div>

            <button
              onclick="location.reload()"
              class="btn btn-outline-dark w-100"
            >
              Recalculate
            </button>
          </div>
        </div>
      </div>
    </div>

    <script>
      const form = document.getElementById("form");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const data = Object.fromEntries(new FormData(form));

        const res = await fetch("/api/calculate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data),
        });

        const result = await res.json();

        document.getElementById("maintenance").innerText = result.maintenance;
        document.getElementById("recommended").innerText = result.recommended;

        form.style.display = "none";
        document.querySelector(".result").style.display = "block";
      });
    </script>
  </body>
</html>
