<!doctype html>
<html>
  <head>
    <title>Sky Travels</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body>
    <!-- 🌍 NAVIGATION BAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
      <div class="container">
        <!-- Brand -->
        <a class="navbar-brand fw-bold" href="#">Sky Travels</a>

        <!-- Toggle Button -->
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#travelNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Menu Items -->
        <div class="collapse navbar-collapse" id="travelNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link active" href="#">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">Destinations</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">Packages</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">Gallery</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">Contact</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- 🌎 CAROUSEL SLIDER -->
    <div id="travelCarousel" class="carousel slide" data-bs-ride="carousel">
      <!-- Indicators -->
      <div class="carousel-indicators">
        <button
          type="button"
          data-bs-target="#travelCarousel"
          data-bs-slide-to="0"
          class="active"
        ></button>
        <button
          type="button"
          data-bs-target="#travelCarousel"
          data-bs-slide-to="1"
        ></button>
        <button
          type="button"
          data-bs-target="#travelCarousel"
          data-bs-slide-to="2"
        ></button>
      </div>

      <!-- Slides -->
      <div class="carousel-inner">
        <div class="carousel-item active">
          <img
            src="https://images.unsplash.com/photo-1502602898657-3e91760cbb34"
            class="d-block w-100"
            height="500"
          />
          <div class="carousel-caption">
            <h3>Paris</h3>
            <p>Experience the beauty of France</p>
          </div>
        </div>

        <div class="carousel-item">
          <img
            src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e"
            class="d-block w-100"
            height="500"
          />
          <div class="carousel-caption">
            <h3>Maldives</h3>
            <p>Relax in tropical paradise</p>
          </div>
        </div>

        <div class="carousel-item">
          <img
            src="https://images.unsplash.com/photo-1526772662000-3f88f10405ff"
            class="d-block w-100"
            height="500"
          />
          <div class="carousel-caption">
            <h3>Dubai</h3>
            <p>Explore luxury and adventure</p>
          </div>
        </div>
      </div>

      <!-- Controls -->
      <button
        class="carousel-control-prev"
        type="button"
        data-bs-target="#travelCarousel"
        data-bs-slide="prev"
      >
        <span class="carousel-control-prev-icon"></span></button
      >1

      <button
        class="carousel-control-next"
        type="button"
        data-bs-target="#travelCarousel"
        data-bs-slide="next"
      >
        <span class="carousel-control-next-icon"></span>
      </button>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
