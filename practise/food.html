<!DOCTYPE html>
<html>
<head>
    <title>Food Ordering System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-danger">
  <div class="container">
    <a class="navbar-brand" href="#">FoodExpress</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
  </div>
</nav>

<!-- Hero Section -->
<div class="container text-center mt-5">
    <h1 class="display-4">Delicious Food Delivered Fast</h1>
    <p class="lead">Order your favorite meals anytime, anywhere.</p>
    <button class="btn btn-success btn-lg">Order Now</button>
</div>

<!-- Food Items Section -->
<div class="container mt-5">
  <div class="row g-4">

    <!-- Item 1 -->
    <div class="col-md-4 col-sm-6">
      <div class="card h-100 shadow">
        <img src="https://via.placeholder.com/300" class="card-img-top" alt="Pizza">
        <div class="card-body text-center">
          <h5 class="card-title">Pizza</h5>
          <p class="card-text">Cheesy and delicious Italian pizza.</p>
          <h6 class="text-primary">₹299</h6>
          <button class="btn btn-danger">Order</button>
        </div>
      </div>
    </div>

    <!-- Item 2 -->
    <div class="col-md-4 col-sm-6">
      <div class="card h-100 shadow">
        <img src="https://via.placeholder.com/300" class="card-img-top" alt="Burger">
        <div class="card-body text-center">
          <h5 class="card-title">Burger</h5>
          <p class="card-text">Juicy grilled burger with fries.</p>
          <h6 class="text-primary">₹199</h6>
          <button class="btn btn-danger">Order</button>
        </div>
      </div>
    </div>

    <!-- Item 3 -->
    <div class="col-md-4 col-sm-6">
      <div class="card h-100 shadow">
        <img src="https://via.placeholder.com/300" class="card-img-top" alt="Pasta">
        <div class="card-body text-center">
          <h5 class="card-title">Pasta</h5>
          <p class="card-text">Creamy white sauce pasta.</p>
          <h6 class="text-primary">₹249</h6>
          <button class="btn btn-danger">Order</button>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- Footer -->
<footer class="bg-dark text-white text-center p-3 mt-5">
  © 2026 FoodExpress | All Rights Reserved
</footer>

<!-- Bootstrap JS Bundle CDN -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
