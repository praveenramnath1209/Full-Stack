<!doctype html>
<html>
  <head>
    <title>Quiz</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
      body {
        background: #f6f7fb;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont;
      }

      .card {
        border-radius: 16px;
        border: none;
        width: 520px;
      }

      .heading {
        font-size: 28px;
        font-weight: 600;
        color: darkred;
      }

      .timer {
        font-size: 22px;
        font-weight: 600;
        color: darkred;
      }

      .question {
        font-size: 20px;
        font-weight: 500;
        margin-bottom: 16px;
      }

      .form-check-label {
        font-size: 18px;
      }

      .btn {
        font-size: 18px;
        padding: 10px 18px;
      }

      .btn-primary {
        background-color: darkred;
        border: none;
      }

      .btn-primary:hover {
        background-color: #a00000;
      }
    </style>
  </head>

  <body class="d-flex justify-content-center align-items-center vh-100">
    <div class="card shadow-sm p-4">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <span class="heading">Quiz</span>
        <span class="timer" id="time">05:00</span>
      </div>

      <div id="quiz"></div>

      <div class="d-flex justify-content-between mt-4">
        <button class="btn btn-outline-secondary" id="prev">Previous</button>
        <button class="btn btn-primary" id="next">Next</button>
      </div>
    </div>

    <script>
      $(function () {
        const totalTime = 5 * 60; // 5 minutes
        let timeLeft = totalTime;
        let timer;

        const questions = [
          {
            q: "Who won the 2023 F1 World Championship?",
            o: ["Hamilton", "Verstappen", "Alonso", "Leclerc"],
            a: 1,
            type: "single",
          },
          {
            q: "Ferrari is based in which country?",
            o: ["France", "Germany", "Italy", "UK"],
            a: 2,
            type: "single",
          },
          {
            q: "Select Straw Hat Pirates",
            o: ["Luffy", "Zoro", "Shanks", "Sanji"],
            a: [0, 1, 3],
            type: "multi",
          },
          {
            q: "Java program starts from?",
            o: ["start()", "run()", "main()", "init()"],
            a: 2,
            type: "single",
          },
          {
            q: "Which are Java OOP concepts?",
            o: ["Inheritance", "Polymorphism", "Compilation", "Encapsulation"],
            a: [0, 1, 3],
            type: "multi",
          },
        ];

        let index = 0;
        let answers = [];

        function startTimer() {
          timer = setInterval(() => {
            timeLeft--;

            let min = Math.floor(timeLeft / 60);
            let sec = timeLeft % 60;

            $("#time").text(
              `${String(min).padStart(2, "0")}:${String(sec).padStart(2, "0")}`,
            );

            if (timeLeft <= 0) {
              clearInterval(timer);
              showResult();
            }
          }, 1000);
        }

        function loadQuestion() {
          let q = questions[index];
          let html = `<div class="question">${index + 1}. ${q.q}</div>`;

          q.o.forEach((opt, i) => {
            let checked = "";
            if (answers[index]) {
              if (q.type === "single" && answers[index] === i)
                checked = "checked";
              if (q.type === "multi" && answers[index].includes(i))
                checked = "checked";
            }

            html += `
              <div class="form-check mb-2">
                <input class="form-check-input"
                  type="${q.type === "single" ? "radio" : "checkbox"}"
                  name="opt"
                  value="${i}"
                  ${checked}>
                <label class="form-check-label">${opt}</label>
              </div>`;
          });

          $("#quiz").fadeOut(150, function () {
            $(this).html(html).fadeIn(150);
          });

          $("#prev").prop("disabled", index === 0);
          $("#next").text(index === questions.length - 1 ? "Finish" : "Next");
        }

        $("#next").click(function () {
          let q = questions[index];
          let selected = [];

          $("input[name='opt']:checked").each(function () {
            selected.push(parseInt($(this).val()));
          });

          if (selected.length === 0) {
            alert("Select at least one option");
            return;
          }

          answers[index] = q.type === "single" ? selected[0] : selected;

          if (index === questions.length - 1) {
            clearInterval(timer);
            showResult();
          } else {
            index++;
            loadQuestion();
          }
        });

        $("#prev").click(function () {
          index--;
          loadQuestion();
        });

        function showResult() {
          let score = 0;

          questions.forEach((q, i) => {
            if (q.type === "single" && answers[i] === q.a) score++;
            if (
              q.type === "multi" &&
              JSON.stringify(answers[i].sort()) === JSON.stringify(q.a.sort())
            ) {
              score++;
            }
          });

          $("#quiz").html(`
            <div class="text-center">
              <h4 class="text-muted">Quiz Completed</h4>
              <h1 class="text-danger">${score} / ${questions.length}</h1>
              <button class="btn btn-primary mt-3" id="restart">Restart</button>
            </div>
          `);

          $(".d-flex.justify-content-between.mt-4").hide();
        }

        $(document).on("click", "#restart", function () {
          index = 0;
          answers = [];
          timeLeft = totalTime;
          $("#time").text("05:00");
          $(".d-flex.justify-content-between.mt-4").show();
          startTimer();
          loadQuestion();
        });

        startTimer();
        loadQuestion();
      });
    </script>
  </body>
</html>
